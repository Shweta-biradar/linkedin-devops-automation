name: LinkedIn Hiring Pitch - Evening Post (6 PM UTC)

on:
  schedule:
    - cron: '0 18 * * *'  # 6 PM UTC daily
  workflow_dispatch:

jobs:
  post-hiring-pitch-evening:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Post Hiring Pitch - Evening
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_MEMBER_ID: ${{ secrets.LINKEDIN_MEMBER_ID }}
          FORCE_FORMAT: hiring_pitch
          POST_TIME: 'evening'
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from linkedin_hiring_pitch_scheduler import post_hiring_pitch
          post_hiring_pitch(post_time='evening', force_format='hiring_pitch')
          "

      - name: Log Success
        if: success()
        run: echo '✅ Evening hiring pitch posted to LinkedIn at 6 PM UTC'

      - name: Log Failure
        if: failure()
        run: echo '❌ Error posting evening hiring pitch'
